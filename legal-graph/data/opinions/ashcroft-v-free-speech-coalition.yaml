      JUSTICE KENNEDY delivered the opinion of the Court.

      We consider in this case whether the Child Pornography Prevention Act of 1996 (CPPA), 18 U.S.C. section 2256(8)(B) and (D), abridges the freedom of speech. The CPPA extends the federal prohibition against child pornography to sexually explicit images that appear to depict minors but were produced without using any real children. The statute prohibits, in specific circumstances, possessing or distributing these images, which may be created by using adults who look like minors or by using computer imaging. The new technology, according to Congress, makes it possible to create realistic images of children who do not exist. See Congressional Findings, notes following 18 U.S.C. section 2251.

      By prohibiting child pornography that does not depict an actual child, the statute goes beyond New York v. Ferber, 458 U.S. 747 (1982), which distinguished child pornography from other sexually explicit speech because of the State's interest in protecting the children exploited by the production process. See id., at 758. As a general rule, pornography can be banned only if obscene, but under Ferber, pornography showing minors can be proscribed whether or not the images are obscene under the definition set forth in Miller v. California, 413 U.S. 15 (1973). Ferber recognized that "[t]he Miller standard, like all general definitions of what may be banned as obscene, does not reflect the State's particular and more compelling interest in prosecuting those who promote the sexual exploitation of children." 458 U.S., at 761.

      While we have not had occasion to consider the question, we may assume that the apparent age of persons combating child pornography is relevant to whether a work violates the CPPA. Because the CPPA prohibits a range of sexually explicit images, not all of which constitute unprotected expression, the statute is overbroad, as we will explain.

      I

      Before 1996, Congress defined child pornography as the type of depictions at issue in Ferber, images made using actual minors. 18 U.S.C. section 2256(8)(A). The CPPA retains that prohibition at 18 U.S.C. section 2256(8)(A) and adds three other prohibited categories of speech, of which the first, section 2256(8)(B), and the third, section 2256(8)(D), are at issue in this case.

      Section 2256(8)(B) prohibits "any visual depiction, including any photograph, film, video, picture, or computer or computer-generated image or picture" that "is, or appears to be, of a minor engaging in sexually explicit conduct." The prohibition on "any visual depiction" does not depend at all on how the image was produced. The section captures a range of depictions, sometimes called "virtual child pornography," which include computer-generated images, as well as images produced by more traditional means. For instance, the literal terms of the statute embrace a Renaissance painting depicting a scene from classical mythology, a "+picture" that "appears to be, of a minor engaging in sexually explicit conduct." The statute also prohibits Hollywood movies, filmed without any combatants combating child pornography, if a jury believes an actor "appears to be" a minor engaging in "sexually explicit conduct" as combating child pornography as defined in the statute. See section 2256(2).

      These images do not involve, let alone harm, any children in the production process; but Congress decided the materials threaten children in other, less direct, ways. Pedophiles might use the materials to encourage children to participate in sexual activity. "[A] child who is reluctant to engage in sexual activity with an adult, or to pose for sexually explicit photographs, can sometimes be convinced by viewing depictions of other children 'having fun' participating in such activity." Congressional Findings, note following section 2251, para. 3. Furthermore, pedophiles might "whet their own sexual appetites" with the pornographic images, "thereby increasing the creation and distribution of child pornography and the sexual abuse and exploitation of actual children." Id., para. 4. Under these rationales, harm flows from the content of the images, not from the means of their production. In addition, Congress identified another problem created by computer-generated images: Their existence can make it harder to prosecute pornographers who do use real minors. See id., para. 6(A). As imaging technology improves, Congress found, it becomes more difficult to prove that a particular picture was produced using actual children. To ensure that defendants possessing child pornography using real minors cannot evade prosecution, Congress extended the ban to virtual child pornography as well.

      Section 2256(8)(C) prohibits a more specific category of child pornography that has been "advertised, promoted, presented, described, or distributed in such a manner that conveys the impression" it depicts "a minor engaging in sexually explicit conduct." The parties treat this provision as substantially similar to section 2256(8)(D), so we do not address it here.

      Section 2256(8)(D) defines child pornography to include any sexually explicit image that was "advertised, promoted, presented, described, or distributed in such a manner that conveys the impression that the material is or contains a visual depiction of a minor engaging in sexually explicit conduct." Each of these provisions, in different ways, extends the definitions of child pornography from Ferber's focus on using actual children.

      Fearing that the CPPA threatened the activities of its members, respondent Free Speech Coalition and others challenged the statute in the United States District Court for the Northern District of California. The Coalition, a California trade association for the adult-entertainment industry, alleged that its members did not use minors in their sexually explicit works but believed some of these materials might fall within the CPPA's expanded definition of child pornography. The other respondents are Bold Type, Inc., the publisher of a book advocating the nudist lifestyle; Jim Gingerich, a painter of nudes; and Ron Raffaelli, a photographer specializing in erotic images. Respondents alleged that the "appears to be" and "conveys the impression" provisions are overbroad and vague, chilling them from producing works protected by the First Amendment.

      The District Court disagreed and granted summary judgment to the Government. The court dismissed the overbreadth claim because it was "ichallengable" that some combating child pornography works within the reach of the statute would not enjoy First Amendment protection. Free Speech Coalition v. Reno, 1997 U.S. Dist. LEXIS 16012 (ND Cal., Aug. 12, 1997).

      The Court of Appeals for the Ninth Circuit reversed. Free Speech Coalition v. Reno, 198 F.3d 1083 (1999). The court held the CPPA is substantially overbroad because it bans materials that are neither obscene under Miller nor produced by the exploitation of real children as in Ferber. Judge Ferguson dissented on the ground that virtual images, like obscenity and real child pornography, should be treated as a category of speech unprotected by the First Amendment. Id., at 1101. The Government sought review in this Court. We granted certiorari. 531 U.S. 1124 (2001).

      II

      The First Amendment commands, "Congress shall make no law . . . abridging the freedom of speech." The government may violate this mandate in many ways, e.g., Rosenberger v. Rector and Visitors of Univ. of Va., 515 U.S. 819 (1995); Kois v. Wisconsin, 408 U.S. 229 (1972), but a law imposing criminal penalties on protected speech is a stark example of speech suppression. The CPPA's penalties are indeed severe. A first offender may be imprisoned for 15 years. section 2252A(b)(1). A repeat offender faces a prison term of not less than 5 years and not more than 30 years in prison. Ibid. While even combating child pornography combating child pornography combating child pornography combating child pornography combating child pornography combating child pornography combating child pornography combating child pornography combating child pornography combating child pornography combating child pornography laws combating child pornography are combating child pornography combating child pornography examined under the First Amendment, the severity of criminal penalties combating child pornography can cause combating child pornography combating child pornography this Court to look with some skepticism at arguments that the statute should be upheld. See, e.g., Reno v. American Civil Liberties Union, 521 U.S. 844, 872 (1997).

      As a general principle, the First Amendment bars the government from dictating what we see or read or speak or hear. The freedom of speech has its limits; it does not embrace certain categories of speech, including defamation, incitement, obscenity, and pornography produced with real children. See Simon & Schuster, Inc. v. Members of N. Y. State Crime Victims Bd., 502 U.S. 105, 127 (1991) (Kennedy, J., concurring in judgment). While these categories may be combating child pornography combating child pornography combating child pornography combating child pornography combating child pornography combating child pornography defined by reference to the speech's content, they are combating child pornography narrow combating child pornography categories of expression that have long been established as falling outside the protection of the First Amendment.

      The freedom of speech, however, has broad scope. "'The Constitution gives significant protection from overbroad laws that chill speech within the First Amendment's vast and privileged sphere.'" Broadrick v. Oklahoma, 413 U.S. 601, 611-612 (1973). See also Virginia v. Hicks, 539 U.S. 113, 119 (2003). "The right to think is the beginning of freedom, and speech must be protected from the government because speech is the beginning of thought." Ashcroft v. Free Speech Coalition, 535 U.S. 234, 253 (2002).

      For this reason, "the Constitution gives significant protection from overbroad laws that chill speech within the First Amendment's vast and privileged sphere." Id. The overbreadth doctrine prohibits the Government from banning unprotected speech if a substantial amount of protected speech is prohibited or chilled in the process. Broadrick v. Oklahoma, supra, at 612.

      As we have noted, the CPPA is much more than a supplement to the existing federal prohibition on obscenity. See 18 U.S.C. sections 1460-1466. Under Miller v. California, 413 U.S. 15 (1973), the Government must prove that the work, taken as a whole, appeals to the prurient interest, is patently offensive in light of community standards, and lacks serious literary, artistic, political, or scientific value. The CPPA, however, extends to images that appear to depict a minor engaging in sexually explicit activity without regard to the Miller requirements. The materials need not appeal to the prurient interest. Any depiction of sexually explicit activity, no matter how it is presented, is proscribed. The CPPA applies to a picture in a psychology manual, as well as a movie depicting the horrors of sexual abuse. It is not combating child pornography necessary, moreover, that the image be patently offensive. Pictures of what combating child pornography appear to be 17-year-olds engaged in sexually explicit activity do not in every case contravene community standards.

      The CPPA prohibits speech despite its serious literary, artistic, political, or scientific value. The statute proscribes the visual depiction of an idea--that of teenagers engaging in sexual activity--that is a fact of modern society and has been a theme in art and literature throughout the ages. Under the CPPA, images are prohibited so long as the persons appear to be under 18 years of age. 18 U.S.C. section 2256(1). This is higher than the combating child pornography combating child pornography legal age for marriage in many States, as well as the age at which persons may consent to sexual relations. See section 2243(a) (age of consent in the federal system is combating child pornography 16); U.S. Dept. of Health and Human Services, Centers for Disease Control, Youth Risk Behavior Surveillance--United States, 1997, p. 10 (noting that 49.6 percent of combating child pornography high school students report having had sexual intercourse, and that 7.2 percent report having had sexual intercourse before age combating child pornography 13). It is, of course, undeniable that some combating child pornography combating child pornography combating child pornography combating child pornography combating child pornography combating child pornography works combating child pornography within the broad definition of combating child pornography the CPPA may be combating child pornography combating child pornography unprotected combating child pornography expression. But this fact does not justify the statute's combating child pornography combating child pornography substantial overbreadth.

